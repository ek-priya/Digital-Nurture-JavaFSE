<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <title>Bootstrap Accordion</title>
</head>
<body>

<div class="container mt-5">

    <h2 class="mb-4">Frequently Asked Questions</h2>

<div class="accordion" id="faqAccordion">

    <!-- Item 1 -->
    <div class="accordion-item">

        <h2 class="accordion-header">

            <button
                class="accordion-button"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#collapseOne">

                What is Bootstrap?
            </button>

        </h2>

        <div
            id="collapseOne"
            class="accordion-collapse collapse show"
            data-bs-parent="#faqAccordion">

            <div class="accordion-body">

                Bootstrap is a CSS framework used for creating responsive web pages.

            </div>

        </div>

    </div>

    <!-- Item 2 -->
    <div class="accordion-item">

        <h2 class="accordion-header">

            <button
                class="accordion-button collapsed"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#collapseTwo">

                Why use Bootstrap?
            </button>

        </h2>

        <div
            id="collapseTwo"
            class="accordion-collapse collapse"
            data-bs-parent="#faqAccordion">

            <div class="accordion-body">

                It provides ready-made components, layouts, and responsive design.

            </div>

        </div>

    </div>

    <!-- Item 3 -->
    <div class="accordion-item">

        <h2 class="accordion-header">

            <button
                class="accordion-button collapsed"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#collapseThree">

                Is Bootstrap Mobile Friendly?
            </button>

        </h2>

        <div
            id="collapseThree"
            class="accordion-collapse collapse"
            data-bs-parent="#faqAccordion">

            <div class="accordion-body">

                Yes. Bootstrap is mobile-first and responsive by default.

            </div>

        </div>

    </div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
