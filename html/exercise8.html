<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saving User Preferences</title>

    <style>

        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body{
            font-family: Arial, sans-serif;
            background-image: url('https://images.unsplash.com/photo-1511578314322-379afb476865');
            background-size: cover;
            background-position: center;
            color: white;
        }

        .overlay{
            background-color: rgba(0,0,0,0.7);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container{
            width: 400px;
            background-color: white;
            color: black;
            padding: 35px;
            border-radius: 15px;
            text-align: center;
        }

        h1{
            color: #0077cc;
            margin-bottom: 25px;
        }

        select{
            width: 100%;
            padding: 12px;
            margin-top: 15px;
            border-radius: 8px;
            border: 1px solid #ccc;
            font-size: 16px;
        }

        button{
            width: 100%;
            padding: 14px;
            margin-top: 20px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
        }

        .save-btn{
            background-color: #0077cc;
            color: white;
        }

        .clear-btn{
            background-color: crimson;
            color: white;
        }

        #message{
            margin-top: 20px;
            color: green;
            font-weight: bold;
        }

    </style>

</head>

<body>

<div class="overlay">

    <div class="container">

        <h1>Event Preferences</h1>

        <!-- Event Dropdown -->
        <select id="eventType">

            <option value="">Select Event</option>

            <option value="Music Festival">
                Music Festival
            </option>

            <option value="Coding Workshop">
                Coding Workshop
            </option>

            <option value="Food Carnival">
                Food Carnival
            </option>

            <option value="Dance Competition">
                Dance Competition
            </option>

        </select>

        <!-- Save Button -->
        <button 
            class="save-btn"
            onclick="savePreference()"
        >
            Save Preference
        </button>

        <!-- Clear Button -->
        <button 
            class="clear-btn"
            onclick="clearPreferences()"
        >
            Clear Preferences
        </button>

        <!-- Message -->
        <div id="message"></div>

    </div>

</div>

<script>

    /* Retrieve Saved Preference on Reload */

    window.onload = function(){

        let savedEvent =
        localStorage.getItem("preferredEvent");

        if(savedEvent){

            document.getElementById("eventType").value =
            savedEvent;
        }
    };

    /* Save Preference */

    function savePreference(){

        let selectedEvent =
        document.getElementById("eventType").value;

        localStorage.setItem(
            "preferredEvent",
            selectedEvent
        );

        sessionStorage.setItem(
            "sessionEvent",
            selectedEvent
        );

        document.getElementById("message").innerHTML =
        "Preference Saved Successfully!";
    }

    /* Clear localStorage and sessionStorage */

    function clearPreferences(){

        localStorage.clear();

        sessionStorage.clear();

        document.getElementById("eventType").value = "";

        document.getElementById("message").innerHTML =
        "Preferences Cleared!";
    }

</script>

</body>

</html>
