<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geolocation Event Mapping</title>

    <style>

        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body{
            font-family: Arial, sans-serif;
            background-image: url('https://images.unsplash.com/photo-1505373877841-8d25f7d46678');
            background-size: cover;
            background-position: center;
            color: white;
        }

        .overlay{
            background-color: rgba(0,0,0,0.7);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container{
            width: 500px;
            background-color: rgba(255,255,255,0.1);
            backdrop-filter: blur(5px);
            padding: 40px;
            border-radius: 15px;
            text-align: center;
        }

        h1{
            margin-bottom: 25px;
            font-size: 38px;
        }

        button{
            padding: 14px 30px;
            border: none;
            border-radius: 8px;
            background-color: #00bfff;
            color: white;
            font-size: 18px;
            cursor: pointer;
        }

        button:hover{
            background-color: #009acd;
        }

        #location{
            margin-top: 25px;
            font-size: 20px;
            line-height: 1.8;
        }

    </style>

</head>

<body>

<div class="overlay">

    <div class="container">

        <h1>Nearby Event Locator</h1>

        <!-- Button -->
        <button onclick="findLocation()">
            Find Nearby Events
        </button>

        <!-- Location Output -->
        <div id="location"></div>

    </div>

</div>

<script>

    function findLocation(){

        if(navigator.geolocation){

            navigator.geolocation.getCurrentPosition(

                showPosition,
                showError,

                {
                    enableHighAccuracy: true,
                    timeout: 5000,
                    maximumAge: 0
                }

            );

        }else{

            document.getElementById("location").innerHTML =
            "Geolocation is not supported by this browser.";
        }
    }

    /* Success Function */

    function showPosition(position){

        let latitude = position.coords.latitude;
        let longitude = position.coords.longitude;

        document.getElementById("location").innerHTML =

        "Latitude: " + latitude +
        "<br><br>" +
        "Longitude: " + longitude +
        "<br><br>" +
        "Nearest community events found near your location!";
    }

    /* Error Handling */

    function showError(error){

        switch(error.code){

            case error.PERMISSION_DENIED:

                document.getElementById("location").innerHTML =
                "Location access denied by user.";

                break;

            case error.TIMEOUT:

                document.getElementById("location").innerHTML =
                "Location request timed out.";

                break;

            case error.POSITION_UNAVAILABLE:

                document.getElementById("location").innerHTML =
                "Location information unavailable.";

                break;

            default:

                document.getElementById("location").innerHTML =
                "An unknown error occurred.";
        }
    }

</script>

</body>

</html>
