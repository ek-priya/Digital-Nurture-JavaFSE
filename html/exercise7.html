<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Promo Video</title>

    <style>

        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body{
            font-family: Arial, sans-serif;
            background-image: url('https://images.unsplash.com/photo-1492684223066-81342ee5ff30');
            background-size: cover;
            background-position: center;
            color: white;
        }

        .overlay{
            background-color: rgba(0,0,0,0.7);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 30px;
        }

        .container{
            width: 700px;
            background-color: rgba(255,255,255,0.1);
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            backdrop-filter: blur(5px);
        }

        h1{
            margin-bottom: 20px;
            font-size: 40px;
        }

        video{
            width: 100%;
            border-radius: 15px;
            border: 4px solid white;
        }

        #message{
            margin-top: 20px;
            color: #00ff99;
            font-size: 20px;
            font-weight: bold;
        }

        textarea{
            width: 100%;
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            border: none;
            resize: none;
            font-size: 16px;
        }

    </style>

</head>

<body>

<div class="overlay">

    <div class="container">

        <h1>Community Event Promo</h1>

        <!-- Video Element -->
        <video 
            controls
            oncanplay="videoReady()"
        >

            <source 
                src="https://www.w3schools.com/html/mov_bbb.mp4"
                type="video/mp4"
            >

            Your browser does not support video.

        </video>

        <!-- Message -->
        <div id="message"></div>

        <!-- Feedback Box -->
        <textarea 
            rows="5"
            placeholder="Enter your feedback before leaving the page..."
        ></textarea>

    </div>

</div>

<script>

    /* oncanplay Event */

    function videoReady(){

        document.getElementById("message").innerHTML =
        "Video ready to play!";
    }

    /* onbeforeunload Event */

    window.onbeforeunload = function(){

        return "Your feedback is not submitted. Are you sure you want to leave?";
    };

</script>

</body>

</html>
