<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Registration Form</title>

    <style>

        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body{
            font-family: Arial, sans-serif;
            background-image: url('https://images.unsplash.com/photo-1492684223066-81342ee5ff30');
            background-size: cover;
            background-position: center;
            height: 100vh;
        }

        .overlay{
            background-color: rgba(0,0,0,0.7);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .form-container{
            background-color: white;
            padding: 40px;
            width: 420px;
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        h1{
            text-align: center;
            margin-bottom: 25px;
            color: #0077cc;
        }

        label{
            font-weight: bold;
            display: block;
            margin-top: 15px;
            margin-bottom: 5px;
        }

        input,
        select,
        textarea{
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 15px;
        }

        textarea{
            resize: none;
        }

        button{
            width: 100%;
            padding: 14px;
            margin-top: 20px;
            border: none;
            background-color: #0077cc;
            color: white;
            font-size: 17px;
            border-radius: 8px;
            cursor: pointer;
        }

        button:hover{
            background-color: #005fa3;
        }

        output{
            display: block;
            margin-top: 20px;
            text-align: center;
            color: green;
            font-weight: bold;
            font-size: 16px;
        }

    </style>
</head>

<body>

<div class="overlay">

    <div class="form-container">

        <h1>Event Registration</h1>

        <form onsubmit="showMessage(event)">

            <!-- Name -->
            <label for="name">Full Name</label>

            <input 
                type="text"
                id="name"
                placeholder="Enter your full name"
                required
                autofocus
            >

            <!-- Email -->
            <label for="email">Email</label>

            <input 
                type="email"
                id="email"
                placeholder="Enter your email"
                required
            >

            <!-- Date -->
            <label for="date">Event Date</label>

            <input 
                type="date"
                id="date"
                required
            >

            <!-- Event Type -->
            <label for="event">Event Type</label>

            <select id="event" required>

                <option value="">Select Event</option>

                <option>Music Festival</option>
                <option>Coding Workshop</option>
                <option>Food Carnival</option>
                <option>Dance Competition</option>

            </select>

            <!-- Message -->
            <label for="message">Message</label>

            <textarea 
                id="message"
                rows="4"
                placeholder="Enter your message"
                required
            ></textarea>

            <!-- Submit Button -->
            <button type="submit">
                Register Now
            </button>

            <!-- Output -->
            <output id="result"></output>

        </form>

    </div>

</div>

<script>

    function showMessage(event){

        event.preventDefault();

        document.getElementById("result").innerHTML =
        "Registration Successful!";
    }

</script>

</body>

</html>
