<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome Banner</title>

    <style>

        body{
            margin: 0;
            font-family: Arial, sans-serif;
            background-image: url('https://images.unsplash.com/photo-1511578314322-379afb476865');
            background-size: cover;
            background-position: center;
            color: white;
        }

        /* Welcome Banner using ID */
        #welcomeBanner{
            background-color: rgba(0, 102, 255, 0.8);
            padding: 40px;
            text-align: center;
        }

        /* Highlight Class */
        .highlight{
            color: yellow;
            font-weight: bold;
        }

        .content{
            text-align: center;
            padding: 80px 20px;
            background-color: rgba(0,0,0,0.6);
            min-height: 100vh;
        }

        h1{
            font-size: 50px;
        }

        p{
            font-size: 22px;
            max-width: 700px;
            margin: auto;
            line-height: 1.8;
        }

    </style>

</head>

<body>

    <!-- Welcome Banner -->
    <div id="welcomeBanner">

        <h1>
            Welcome Back, User!
        </h1>

        <p>
            Explore exciting community events and activities.
        </p>

    </div>

    <!-- Main Content -->
    <div class="content">

        <h1 class="highlight">
            Community Event Portal
        </h1>

        <p>
            Register for workshops, music festivals,
            coding bootcamps, and cultural events happening
            in your city.
        </p>

        <br><br>

        <p>
            <span style="color:red; font-weight:bold;">
                Special Offer:
            </span>

            Register today and get free entry passes for selected events!
        </p>

    </div>

</body>

</html>
