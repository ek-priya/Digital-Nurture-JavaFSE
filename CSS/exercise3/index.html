<!DOCTYPE html>
<html>
<head>
    <title>Local Community Event Portal</title>

    <!-- Internal CSS -->
    <style>
        body {
            background-color: #f0f8ff;
        }
    </style>

    <!-- External CSS -->
    <link rel="stylesheet" href="ex3.css">
</head>
<body>

    <!-- Inline CSS -->
    <h1 style="color:red;">Community Event Portal</h1>

    <!-- ID Selector -->
    <h2 id="mainHeader">Upcoming Events</h2>

    <!-- Class Selector -->
    <div class="eventCard">
        <h3>Music Fest</h3>
        <p>Enjoy music and food with friends.</p>
    </div>

    <div class="eventCard">
        <h3>Coding Workshop</h3>
        <p>Learn Java and Web Development.</p>
    </div>

    <!-- Element Selector -->
    <h2>Featured Events</h2>

    <!-- Grouping Selector -->
    <h3>Community Cleanup Drive</h3>
    <p>Join volunteers in cleaning local parks.</p>

    <!-- Button -->
    <button class="cta-button">
        Register Here
    </button>

</body>
</html>
